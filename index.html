<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ME Growth Bridge | Multilingual & AI-Native Growth Consultant</title>
<meta name="description" content="Top-Ranked Sales Performer. Multilingual Execution across APAC, EU, & UK. Custom Generative AI Workflows.">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background-color: #0e0c0a;
    color: #faf9f6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
    padding: 2rem;
}

.container {
    max-width: 800px;
    margin: 0 auto;
}

/* HEADER — upgraded hierarchy */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #292420;
    padding-bottom: 1.5rem; /* slightly tighter for premium feel */
    margin-bottom: 3rem;
}

.brand-logo {
    display: flex;
    align-items: center;
    gap: 1rem; /* improved breathing room */
}

.brand-logo img {
    height: 88px; /* KEY FIX: stronger visual identity */
    width: auto;
    display: block;
}

.logo-text {
    font-weight: 700;
    font-size: 1.1rem; /* reduced dominance vs icon */
    letter-spacing: -0.3px;
}

.logo-text span {
    color: #d4af37;
}

.brand-sub {
    font-size: 0.75rem;
    color: #a19a95;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 0.2rem;
}

.header-nav {
    display: flex;
    gap: 1.5rem;
}

.header-nav a {
    color: #a19a95;
    text-decoration: none;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
    transition: color 0.2s;
}

.header-nav a:hover {
    color: #d4af37;
}

/* rest unchanged */
h1 {
    font-size: 2.5rem;
    line-height: 1.2;
    margin-bottom: 1rem;
}

.gold { color: #d4af37; }
.sky { color: #38bdf8; }

p {
    color: #a19a95;
    font-size: 1.1rem;
    margin-bottom: 2rem;
}

.video-box {
    background-color: #171412;
    border: 1px solid #292420;
    padding: 1.5rem;
    border-radius: 8px;
    margin-bottom: 3rem;
}

.video-link-card {
    text-decoration: none;
    display: block;
    text-align: center;
    padding: 3.5rem 2rem;
    background: #221c18;
    border: 1px dashed #d4af37;
    border-radius: 6px;
    transition: all 0.3s ease;
    margin-top: 1.25rem;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

.video-link-card:hover {
    background: #2b231e;
    transform: translateY(-2px);
    border-style: solid;
}

.services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1.5rem;
    margin-bottom: 3rem;
}

.card {
    background-color: #171412;
    border: 1px solid #292420;
    padding: 1.5rem;
    border-radius: 6px;
}

.tag-container {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 3rem;
}

.tag {
    background-color: #171412;
    border: 1px solid #292420;
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    font-size: 0.9rem;
}

footer {
    text-align: center;
    margin-top: 4rem;
    color: #a19a95;
    font-size: 0.85rem;
    border-top: 1px solid #292420;
    padding-top: 2rem;
}

/* MOBILE OPTIMISATION */
@media (max-width: 600px) {
    h1 { font-size: 1.8rem; }

    .header-nav { display: none; }

    body { padding: 1.25rem; }

    .brand-logo img {
        height: 64px; /* keeps hierarchy correct on mobile */
    }
}
</style>
</head>

<body>
<div class="container">

<header>
    <div>
        <div class="brand-logo">
            <img src="logo.png" alt="ME Growth Bridge Logo">
            <div>
                <div class="logo-text">
                    ME GROWTH BRIDGE<span>.</span>
                </div>
                <div class="brand-sub">M.E. Strategic Contractor Practice</div>
            </div>
        </div>
    </div>

    <nav class="header-nav">
        <a href="#services">Services</a>
        <a href="#ai">AI Stack</a>
        <a href="#contact">Contact</a>
    </nav>
</header>
