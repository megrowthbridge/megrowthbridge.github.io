<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ME Growth Bridge | Multilingual & AI-Native Growth Consultant</title>
    <meta name="description" content="Top-Ranked Sales Performer. Multilingual Execution across APAC, EU, & UK. Custom Generative AI Workflows.">
    
    <!-- GOOGLE FONTS: SYNE FOR DISPLAY HEADINGS, INTER FOR READABLE BODY TEXT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">

    <style>
        /* CLAUDE'S LUXURY APAC-GLOBAL PALETTE */
        :root {
            --bg: #0e0c0a;            /* Warm Obsidian Black/Brown Base */
            --surface: #171412;       /* Deep Charcoal Brown Card */
            --border: #292420;        /* Earth Slate Border */
            --gold: #d4af37;          /* Performance & Ambition Gold Accent */
            --sky: #38bdf8;           /* Global Reach Sky Blue Accent */
            --text-main: #faf9f6;     /* Off-White Alabaster Text */
            --text-muted: #a19a95;    /* Muted Taupe Grey Text */
        }

        html {
            scroll-behavior: smooth;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0e0c0a !important;
            color: #faf9f6 !important;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            padding: 0 1.5rem;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 0 8rem 0;
        }

        /* HEADER BRANDING */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5rem;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--gold);
        }

        .brand-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0.2rem;
        }

        /* CTA BUTTONS */
        .btn {
            display: inline-block;
            background-color: var(--gold);
            color: #000;
            font-weight: 700;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
        }

        /* TYPOGRAPHIC HERO STATEMENT */
        .hero {
            margin-bottom: 6rem;
        }

        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: calc(2rem + 2vw);
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 2rem;
        }

        .hero .line-gold { color: var(--gold); }
        .hero .line-sky { color: var(--sky); }
        .hero .line-white { color: var(--text-main); }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 680px;
            line-height: 1.5;
        }

        /* SIGNATURE VIDEO SHOWCASE SECTION */
        .video-showcase {
            margin-bottom: 6rem;
        }

        .video-wrapper {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 2.5rem;
            align-items: center;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        .video-text h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--gold);
        }

        .video-text p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .tech-stack {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--sky);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* RESOLUTIONS / SERVICES GRID */
        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 2.5rem;
            letter-spacing: -0.5px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 6rem;
        }

        .service-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 6px;
        }

        .service-card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 0.75rem;
            color: var(--text-main);
        }

        .service-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* CREDENTIAL MATRIX: EDUCATION + AI ENGINE */
        .credentials-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 6rem;
        }

        .credential-box {
            background-color: var(--surface);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 6px;
        }

        .credential-box h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.75rem;
        }

        .edu-item h4 {
            color: var(--gold);
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .edu-item p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .edu-bullet {
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
            color: var(--text-main);
        }

        /* AUTOMATION / AI TRACKER DOTS */
        .ai-list {
            list-style: none;
        }

        .ai-item {
            display: flex;
            align-items: center;
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
            color: var(--text-main);
        }

        .dot-completed {
            height: 8px; width: 8px; background-color: var(--gold); border-radius: 50%; margin-right: 12px; display: inline-block;
            box-shadow: 0 0 8px var(--gold);
        }

        .dot-progress {
            height: 6px; width: 6px; border: 2px solid var(--sky); border-radius: 50%; margin-right: 12px; display: inline-block;
            box-shadow: 0 0 8px var(--sky);
        }

        /* CONTACT COMPONENT */
        .contact-section {
            background-color: var(--surface);
            border: 1px solid var(--border);
            padding: 3rem;
            border-radius: 8px;
            max-width: 650px;
        }

        .contact-section p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            background-color: var(--bg);
            border: 1px solid var(--border);
            padding: 0.85rem;
            color: white;
            border-radius: 4px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--gold);
            color: #000;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background-color: #f1c40f;
        }

        footer {
            text-align: center;
            margin-top: 8rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .lang-tag {
            background-color: rgba(212,175,55,0.05);
            padding: 0.35rem 0.85rem;
            border-radius: 4px;
            font-size: 0.85rem;
            border: 1px solid rgba(212,175,55,0.2);
            color: var(--text-main);
            font-weight: 500;
        }
