<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bridgeGradAU" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="techGradAU" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#B8956A;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glowAU">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Bridge Arch -->
  <path d="M20 140 Q100 20 180 140" stroke="url(#bridgeGradAU)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M35 140 Q100 45 165 140" stroke="url(#bridgeGradAU)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Bridge Pillars -->
  <line x1="20" y1="140" x2="20" y2="170" stroke="url(#bridgeGradAU)" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="140" x2="180" y2="170" stroke="url(#bridgeGradAU)" stroke-width="3" stroke-linecap="round"/>

  <!-- Bridge Deck -->
  <line x1="15" y1="140" x2="185" y2="140" stroke="url(#bridgeGradAU)" stroke-width="2" stroke-linecap="round"/>

  <!-- Fingerprint in center -->
  <g transform="translate(100, 100)" filter="url(#glowAU)">
    <ellipse cx="0" cy="0" rx="28" ry="32" stroke="#2DD4BF" stroke-width="1" fill="none" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="22" ry="26" stroke="#2DD4BF" stroke-width="0.8" fill="none" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="16" ry="20" stroke="#2DD4BF" stroke-width="0.8" fill="none" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="10" ry="14" stroke="#2DD4BF" stroke-width="0.8" fill="none" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="5" ry="8" stroke="#2DD4BF" stroke-width="0.8" fill="none" opacity="0.4"/>

    <path d="M-20 -15 Q-10 -25 0 -20 Q10 -25 20 -15" stroke="#2DD4BF" stroke-width="0.6" fill="none" opacity="0.5"/>
    <path d="M-24 -5 Q-12 -15 0 -10 Q12 -15 24 -5" stroke="#2DD4BF" stroke-width="0.6" fill="none" opacity="0.5"/>
    <path d="M-26 5 Q-14 -5 0 0 Q14 -5 26 5" stroke="#2DD4BF" stroke-width="0.6" fill="none" opacity="0.5"/>
    <path d="M-24 15 Q-12 5 0 10 Q12 5 24 15" stroke="#2DD4BF" stroke-width="0.6" fill="none" opacity="0.5"/>
    <path d="M-18 25 Q-8 15 0 20 Q8 15 18 25" stroke="#2DD4BF" stroke-width="0.6" fill="none" opacity="0.5"/>

    <circle cx="0" cy="0" r="3" fill="#D4A574" opacity="0.9"/>
  </g>

  <!-- AI Circuit Lines -->
  <g stroke="url(#techGradAU)" stroke-width="1" fill="none" opacity="0.7">
    <path d="M50 80 L65 95 L65 115"/>
    <path d="M40 100 L55 100 L55 120"/>
    <path d="M45 120 L60 130 L60 145"/>
    <path d="M150 80 L135 95 L135 115"/>
    <path d="M160 100 L145 100 L145 120"/>
    <path d="M155 120 L140 130 L140 145"/>
    <path d="M80 155 L80 165 L100 175 L120 165 L120 155"/>
    <path d="M60 160 L60 170 L100 185 L140 170 L140 160"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="#D4A574">
    <circle cx="65" cy="95" r="2.5" opacity="0.9"/>
    <circle cx="55" cy="100" r="2" opacity="0.8"/>
    <circle cx="60" cy="130" r="2" opacity="0.8"/>
    <circle cx="135" cy="95" r="2.5" opacity="0.9"/>
    <circle cx="145" cy="100" r="2" opacity="0.8"/>
    <circle cx="140" cy="130" r="2" opacity="0.8"/>
    <circle cx="100" cy="175" r="2.5" opacity="0.9"/>
    <circle cx="100" cy="185" r="2" opacity="0.8"/>
  </g>

  <!-- Data flow particles -->
  <g fill="#2DD4BF" opacity="0.6">
    <circle cx="58" cy="108" r="1.2">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="142" cy="108" r="1.2">
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="180" r="1.5">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>